repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff # lint
        args: [--fix]
      - id: ruff-format # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [aiohttp]
        args: [--config-file=pyproject.toml]
        pass_filenames: false
